<!--
  Reusable site navigation.

  This is the canonical source for the navigation markup, written for use
  from the repository root (i.e. by index.html). The project has no
  templating or build step (Master Development Standard, Section 5), so
  this exact markup is inlined directly in index.html. When a new page is
  added under pages/ or products/, copy this block in and adjust every
  relative href for that page's location — see products/utility-sheds.html
  for a worked example one folder deep (index.html#about becomes
  ../index.html#about, and products/garden-rooms.html becomes
  garden-rooms.html).

  Anchor links like #gallery-preview target sections on the homepage.
-->
<header class="site-header" data-site-header>
  <div class="container nav-container">
    <a href="index.html#top" class="logo" aria-label="Hereford Patio & Sheds — Home">
      <!-- Temporary logo: simple shed outline, swap for a professional mark when available. -->
      <svg class="logo-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <path d="M4 15L16 5L28 15" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M7 13V27H25V13" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M13 27V19H19V27" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span class="logo-text">Hereford Patio &amp; Sheds</span>
    </a>

    <button
      class="nav-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="primary-navigation"
      aria-label="Toggle navigation menu"
    >
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>

    <nav id="primary-navigation" class="primary-navigation" aria-label="Primary">
      <ul class="nav-menu">
        <li><a href="index.html#top">Home</a></li>
        <li class="nav-item-dropdown">
          <button
            type="button"
            class="nav-dropdown-trigger"
            aria-expanded="false"
            aria-controls="products-dropdown-menu"
          >
            Products
            <svg class="nav-dropdown-caret" viewBox="0 0 12 8" fill="none" aria-hidden="true">
              <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <ul id="products-dropdown-menu" class="nav-dropdown-menu">
            <li><a href="products/index.html">All Products</a></li>
            <li><a href="products/utility-sheds.html">Utility Sheds</a></li>
            <li><a href="products/garden-rooms.html">Garden Rooms</a></li>
            <li><a href="products/summer-houses.html">Summer Houses</a></li>
            <li><a href="products/garden-offices.html">Garden Offices</a></li>
          </ul>
        </li>
        <li><a href="index.html#gallery-preview">Gallery</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <a href="index.html#contact" class="btn btn-primary nav-cta">Get a Quote</a>
    </nav>
  </div>
</header>
